<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Central Line Status Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
      background: #f0f4ff;
    }
    #status {
      margin-top: 1rem;
      padding: 1rem;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

<h1>🚇 Central Line Status</h1>
<p>Live TfL status feed:</p>

<div id="status">Loading…</div>

<script>
async function loadStatus() {
    const box = document.getElementById("status");

    // TfL Line Status endpoint (CORS‑safe)
    const url = "https://api.tfl.gov.uk/Line/central/Status";

    try {
        const res = await fetch(url);
        const data = await res.json();

        const line = data[0];
        const state = line.lineStatuses[0].statusSeverityDescription;
        const reason = line.lineStatuses[0].reason || "";

        box.innerHTML = `
            <strong>Status:</strong> ${state}<br>
            ${reason ? `<em>${reason}</em>` : ""}
        `;
    } catch (err) {
        box.textContent = "Error loading line status.";
        console.error(err);
    }
}

loadStatus();
</script>

</body>
</html>
