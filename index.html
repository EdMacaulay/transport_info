<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elizabeth Line – Stratford Departures</title>

    <style>
        body {
            font-family: system-ui, sans-serif;
            padding: 2rem;
            background: #f0f4ff;
            color: #001f3f;
        }
        h1 {
            margin-bottom: 0.5rem;
        }
        #result {
            margin-top: 1.5rem;
            padding: 1rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .time {
            font-size: 1.4rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🚆 Elizabeth Line – Stratford</h1>
    <p>Next departure:</p>

    <div id="result">Loading...</div>

    <script>
        async function loadNextTrain() {
            const resultDiv = document.getElementById("result");

            try {
                // TfL API endpoint: arrivals for a specific station (StopPoint)
                const url = "https://api.tfl.gov.uk/StopPoint/STFD/Arrivals";

                const res = await fetch(url);
                const data = await res.json();

                // Filter for Elizabeth line (lineId = "elizabeth")
                const liz = data.filter(t => t.lineId === "elizabeth");

                if (liz.length === 0) {
                    resultDiv.textContent = "No Elizabeth line data available.";
                    return;
                }

                // Sort by next arrival (expected arrival time)
                liz.sort((a, b) => a.timeToStation - b.timeToStation);

                const next = liz[0];
                const minutes = Math.round(next.timeToStation / 60);

                resultDiv.innerHTML = `
                    <div class="time">${minutes} minute(s)</div>
                    <div>Destination: <strong>${next.destinationName}</strong></div>
                    <div>Platform: ${next.platformName || "Unknown"}</div>
                    <div>Scheduled: ${new Date(next.expectedArrival).toLocaleTimeString()}</div>
                `;
            } catch (err) {
                resultDiv.textContent = "Error loading data.";
                console.error(err);
            }
        }

        loadNextTrain();
        setInterval(loadNextTrain, 20000); // refresh every 20 seconds
    </script>

</body>
</html>
